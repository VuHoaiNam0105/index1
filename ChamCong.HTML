<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Check-in | Hệ Thống Chấm Công</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary-color: #4361ee;
            --secondary-color: #3f37c9;
            --success-color: #4cc9f0;
            --bg-body: #f8f9fc;
        }

        body { 
            background-color: var(--bg-body); 
            font-family: 'Inter', sans-serif; 
            color: #2b2d42;
        }

        .navbar-brand { font-weight: 700; color: var(--primary-color) !important; }
        
        /* Card Styling */
        .card { 
            border: none; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.04); 
            transition: transform 0.2s;
        }
        
        .stat-card {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
        }

        /* Button Styling */
        .btn { border-radius: 12px; padding: 10px 20px; font-weight: 600; }
        .btn-checkin { 
            background: var(--primary-color); 
            color: white; 
            box-shadow: 0 4px 15px rgba(67, 97, 238, 0.3);
        }
        .btn-checkin:hover { background: var(--secondary-color); color: white; }

        /* Table Styling */
        .table thead th { 
            background-color: #fff; 
            text-transform: uppercase; 
            font-size: 0.75rem; 
            letter-spacing: 1px; 
            color: #8d99ae;
            border-bottom: 1px solid #edf2f4;
        }
        .table tbody td { vertical-align: middle; padding: 15px 10px; border-bottom: 1px solid #edf2f4; }

        /* Badge Styling */
        .badge-status { padding: 6px 12px; border-radius: 8px; font-size: 0.7rem; }
        
        #digital-clock {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-light bg-white border-bottom mb-4">
    <div class="container">
        <a class="navbar-brand" href="#">
            <i data-lucide="clock-9" class="d-inline-block align-text-top me-2"></i>
            TIMEKEEP PRO
        </a>
        <span class="text-muted small" id="current-date"></span>
    </div>
</nav>

<div class="container">
    <div class="row g-4">
        <div class="col-lg-4">
            <div class="card p-4 text-center mb-4">
                <div id="digital-clock">00:00:00</div>
                <p class="text-muted small">Vui lòng chọn tên để bắt đầu</p>
                
                <div class="text-start mt-3">
                    <label class="form-label small fw-bold text-uppercase">Nhân viên</label>
                    <select id="employeeName" class="form-select form-select-lg mb-3 shadow-sm border-0 bg-light">
                        <option value="">-- Chọn nhân viên --</option>
                        <option>VŨ HOÀI NAM</option>
                    </select>
                    <button onclick="handleAttendance()" class="btn btn-checkin btn-lg w-100 d-flex align-items-center justify-content-center">
                        <i data-lucide="fingerprint" class="me-2"></i> XÁC NHẬN CÔNG
                    </button>
                </div>
            </div>

            <div class="card p-4">
                <h6 class="fw-bold mb-3 d-flex align-items-center">
                    <i data-lucide="bar-chart-3" class="me-2 text-primary"></i> báo cáo tháng
                </h6>
                <div class="row g-2 mb-3">
                    <div class="col-6">
                        <input type="number" id="selMonth" class="form-control form-control-sm" value="3" title="Tháng">
                    </div>
                    <div class="col-6">
                        <input type="number" id="selYear" class="form-control form-control-sm" value="2026" title="Năm">
                    </div>
                </div>
                <div class="d-grid gap-2">
                    <button onclick="showMonthlyReport()" class="btn btn-light btn-sm text-primary">Xem tổng hợp</button>
                    <button onclick="exportToExcel()" class="btn btn-outline-secondary btn-sm d-flex align-items-center justify-content-center">
                        <i data-lucide="download" class="me-2" style="width:16px"></i> Xuất Excel
                    </button>
                </div>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <div class="card stat-card p-3">
                        <div class="small opacity-75">Hôm nay: <span id="today-summary">0</span> lượt</div>
                        <div class="h4 mb-0 fw-bold">Hoạt động</div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card p-3 border-start border-primary border-4">
                        <div class="small text-muted">Trạng thái hệ thống</div>
                        <div class="h4 mb-0 fw-bold text-success">Sẵn sàng</div>
                    </div>
                </div>
            </div>

            <div class="card overflow-hidden">
                <div class="card-header bg-white py-3 border-0">
                    <h6 class="mb-0 fw-bold">Lịch sử chấm công hôm nay</h6>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead>
                            <tr>
                                <th>Nhân viên</th>
                                <th>Vào</th>
                                <th>Ra</th>
                                <th>Tổng (h)</th>
                                <th>Tình trạng</th>
                            </tr>
                        </thead>
                        <tbody id="attendanceLog"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="reportModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow" style="border-radius: 20px;">
            <div class="modal-header border-0">
                <h5 class="modal-title fw-bold">Tổng hợp công tháng <span id="viewingMonth"></span></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" id="reportContent"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Khởi tạo Lucide Icons
    lucide.createIcons();

    let data = JSON.parse(localStorage.getItem('attendanceData')) || [];

    // Đồng hồ thời gian thực
    function updateClock() {
        const now = new Date();
        document.getElementById('digital-clock').innerText = now.toLocaleTimeString('vi-VN');
        document.getElementById('current-date').innerText = now.toLocaleDateString('vi-VN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    }
    setInterval(updateClock, 1000);
    updateClock();

    function handleAttendance() {
        const name = document.getElementById('employeeName').value;
        if (!name) return alert("Vui lòng chọn tên nhân viên!");

        const now = new Date();
        const dateStr = now.toISOString().split('T')[0];
        const timeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');

        let record = data.find(r => r.name === name && r.date === dateStr && r.timeOut === "");

        if (!record) {
            data.push({
                date: dateStr,
                name: name,
                timeIn: timeStr,
                timeOut: "",
                workHours: 0,
                ot: 0
            });
        } else {
            record.timeOut = timeStr;
            const [hIn, mIn] = record.timeIn.split(':').map(Number);
            const startTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), hIn, mIn);
            const diffMs = now - startTime;
            const hours = Math.round((diffMs / (1000 * 60 * 60)) * 100) / 100;
            
            record.workHours = hours;
            record.ot = Math.max(0, hours - 8);
        }

        localStorage.setItem('attendanceData', JSON.stringify(data));
        renderTable();
        lucide.createIcons();
    }

    function renderTable() {
        const today = new Date().toISOString().split('T')[0];
        const tbody = document.getElementById('attendanceLog');
        const list = data.filter(r => r.date === today);
        tbody.innerHTML = "";
        
        document.getElementById('today-summary').innerText = list.length;

        list.forEach(r => {
            const statusBadge = r.timeOut 
                ? '<span class="badge bg-light text-muted badge-status">Đã về</span>' 
                : '<span class="badge bg-success-subtle text-success badge-status">Đang làm việc</span>';
            
            tbody.innerHTML += `
                <tr>
                    <td class="fw-bold text-primary">${r.name}</td>
                    <td><span class="text-muted small"><i data-lucide="log-in" style="width:14px"></i></span> ${r.timeIn}</td>
                    <td><span class="text-muted small"><i data-lucide="log-out" style="width:14px"></i></span> ${r.timeOut || '--:--'}</td>
                    <td class="fw-semibold">${r.workHours}h</td>
                    <td>${statusBadge}</td>
                </tr>
            `;
        });
        if (list.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="text-center py-5 text-muted">Chưa có dữ liệu chấm công hôm nay</td></tr>';
        }
    }

    function showMonthlyReport() {
        const m = parseInt(document.getElementById('selMonth').value);
        const y = parseInt(document.getElementById('selYear').value);
        document.getElementById('viewingMonth').innerText = `${m}/${y}`;
        
        const summary = {};
        data.forEach(r => {
            const rDate = new Date(r.date);
            if (rDate.getMonth() + 1 === m && rDate.getFullYear() === y) {
                if (!summary[r.name]) summary[r.name] = { total: 0, ot: 0, days: 0 };
                summary[r.name].total += r.workHours;
                summary[r.name].ot += r.ot;
                summary[r.name].days += 1;
            }
        });

        let html = '<div class="list-group list-group-flush">';
        for (let name in summary) {
            html += `
            <div class="list-group-item px-0 py-3">
                <div class="d-flex justify-content-between align-items-center mb-1">
                    <span class="fw-bold">${name}</span>
                    <span class="badge bg-primary-subtle text-primary">${summary[name].days} ngày công</span>
                </div>
                <div class="d-flex justify-content-between small text-muted">
                    <span>Tổng: ${summary[name].total.toFixed(2)}h</span>
                    <span>Tăng ca: <b class="text-danger">${summary[name].ot.toFixed(2)}h</b></span>
                </div>
            </div>`;
        }
        html += '</div>';
        
        document.getElementById('reportContent').innerHTML = Object.keys(summary).length ? html : '<div class="text-center py-4">Không có dữ liệu cho tháng này.</div>';
        new bootstrap.Modal(document.getElementById('reportModal')).show();
    }

    function exportToExcel() {
        const worksheet = XLSX.utils.json_to_sheet(data);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "ChamCong");
        XLSX.writeFile(workbook, "Du_lieu_cham_cong.xlsx");
    }

    renderTable();
</script>

</body>
</html>
